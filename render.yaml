services:
  - type: web
    name: applymate-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -m py_compile backend/server.py
    startCommand: python backend/server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APPLYMATE_HOST
        value: 0.0.0.0
      - key: APPLYMATE_ALLOWED_ORIGINS
        sync: false
      - key: APPLYMATE_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: scholarship-files
